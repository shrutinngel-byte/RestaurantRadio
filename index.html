    ];

    const jingleSequence = [
        { file: 'kannada.mp3', name: 'Kannada Jingle' },
        { file: 'english.mp3', name: 'English Jingle' },
        { file: 'hindi.mp3', name: 'Hindi Jingle' },
        { file: 'trilingual.mp3', name: 'Trilingual Jingle' }
    ];

    let songIdx = 0;
    let jingleIdx = 0;
    let player;
    let isPlayerReady = false; // Safety flag
    const jinglePlayer = document.getElementById('jingle-player');

    // 1. Load YouTube API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            videoId: youtubePlaylist[songIdx].id,
            playerVars: { 'autoplay': 0, 'controls': 1 },
            events: { 
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange 
            }
        });
    }

    function onPlayerReady(event) {
        isPlayerReady = true; // Now we know the player can accept commands
    }

    // 2. The Bridge Logic
    jinglePlayer.onended = function() {
        if (isPlayerReady) {
            console.log("Jingle ended, loading song:", youtubePlaylist[songIdx].title);
            player.loadVideoById(youtubePlaylist[songIdx].id);
            updateUI("Music", youtubePlaylist[songIdx].title);
        } else {
            console.error("YouTube Player not ready yet!");
        }
    };

    // Error handling for Jingle files
    jinglePlayer.onerror = function() {
        console.error("Failed to load jingle file:", jinglePlayer.src);
        // If jingle fails, skip straight to the song so the radio doesn't die
        if (isPlayerReady) player.loadVideoById(youtubePlaylist[songIdx].id);
    };

    function startApp() {
        document.querySelector('.btn-start').style.display = 'none';
        playJingle();
    }

    function triggerNextRadioCycle() {
        if (player && player.stopVideo) player.stopVideo();
        jinglePlayer.pause();
        jinglePlayer.currentTime = 0;

        songIdx = (songIdx + 1) % youtubePlaylist.length;
        jingleIdx = (jingleIdx + 1) % jingleSequence.length;

        playJingle();
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            songIdx = (songIdx + 1) % youtubePlaylist.length;
            jingleIdx = (jingleIdx + 1) % jingleSequence.length;
            playJingle();
        }
    }

    function playJingle() {
        const currentJingle = jingleSequence[jingleIdx];
        jinglePlayer.src = currentJingle.file;
        jinglePlayer.play().catch(error => {
            console.log("Browser blocked autoplay. User must click Start.");
        });
        updateUI("Jingle", currentJingle.name);
    }

    function updateUI(type, text) {
        const nameEl = document.getElementById('status-name');
        if(nameEl) {
            nameEl.innerText = text;
            nameEl.style.color = (type === "Jingle") ? "#3498db" : "#ff4757";
        }
    }
</script>
