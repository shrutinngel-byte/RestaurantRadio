<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Radio Player</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        #wrapper { border: 2px solid #333; width: 300px; margin: 50px auto; padding: 20px; }
        button { padding: 10px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="wrapper">
        <h2>Restaurant Radio</h2>
        <div id="status">Status: Standby</div>
        <div id="yt-placeholder"></div>
        <button onclick="start()">START</button>
        <button onclick="skip()">SKIP</button>
    </div>

    <audio id="jingle-player"></audio>

    <script>
        // Simplified playlist for testing
        const songs = [
            { id: 're88S-5fpmA', title: 'Ekadantaya' },
            { id: 'xNR4FAEGxV4', title: 'Munjane Manjali' },
            { id: '9YyqozMDlMk', title: 'Gandhada gudi' }
        ];

        const jingles = ['kannada.mp3', 'english.mp3', 'hindi.mp3'];
        
        let sIdx = 0;
        let jIdx = 0;
        let player;
        const jPlayer = document.getElementById('jingle-player');

        // Load YouTube API
        try {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);
        } catch (e) {
            alert("API Load Error: " + e);
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-placeholder', {
                height: '0',
                width: '0',
                videoId: songs[sIdx].id,
                events: { 'onStateChange': checkEnd }
            });
        }

        function start() {
            playNextCycle();
        }

        function skip() {
            sIdx = (sIdx + 1) % songs.length;
            jIdx = (jIdx + 1) % jingles.length;
            playNextCycle();
        }

        function playNextCycle() {
            document.getElementById('status').innerText = "Playing Jingle...";
            jPlayer.src = jingles[jIdx];
            jPlayer.play();
        }

        jPlayer.onended = function() {
            document.getElementById('status').innerText = "Playing: " + songs[sIdx].title;
            player.loadVideoById(songs[sIdx].id);
        };

        function checkEnd(event) {
            if (event.data === YT.PlayerState.ENDED) {
                sIdx = (sIdx + 1) % songs.length;
                jIdx = (jIdx + 1) % jingles.length;
                playNextCycle();
            }
        }
    </script>
</body>
</html>
