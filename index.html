    const youtubePlaylist = [

        { id: '6z1U-kJ3xJE', title: 'Chunari Chunari' },
        { id: 'xNR4FAEGxV4', title: 'Munjane Manjali'},
        { id: '1BWdglekty0', title: 'Mahi Ve' },
        { id: 'wDIrpvH8MzE', title: 'Desi Girl' },
        { id: '3XShkcOze3s', title: 'Singara Siriye' },
        { id: '6cKErCWrb44', title: 'Goomar' },
        { id: 'P1fIdFRnfqw', title: 'What Jhumka' },
        { id: 'sVsxtmDWY-Y', title: 'Nodayya' },
        { id: 'AMuRRXCuy-4', title: 'Pal Pal' },
        { id: 'vtTaDjzbPx8', title: 'Tu is tarah' },
        { id: 'H1v4R5yPkZA', title: 'Sathiya Nahi' },
        { id: 'mRiSmdJ_7do', title: 'Aaksha dinda' },
        { id: '5l8Ljeo_6kM', title: 'Aaseya bhava' },
        { id: 'J-pEDL4m1WA', title: 'Elliruve' },
        { id: 'e5byqxOkzRw', title: 'Tunturu' },
        { id: 'laoJjq7-WGQ', title: 'Kanmani' },
        { id: '8eJrma1De5I', title: 'Shivuni' },
        { id: 'x6Q7c9RyMzk', title: 'Rowdy Baby' },
        { id: 'QrCQyRSoEtY', title: 'Mungaru' },
        { id: '-xmRjO2G05c', title: 'Ninnidale' },
        { id: 'V6heL74n_DE', title: 'Antu Intu' }
    ];

    const jingleSequence = [
        { file: 'kannada.mp3', name: 'Kannada Jingle' },
        { file: 'english.mp3', name: 'English Jingle' },
        { file: 'hindi.mp3', name: 'Hindi Jingle' },
        { file: 'trilingual.mp3', name: 'Trilingual Jingle' }
    ];

    // 2. STATE TRACKING
    let songIdx = 0;
    let jingleIdx = 0;
    let player = null; // Start as null for safety
    const jinglePlayer = document.getElementById('jingle-player');
    const statusName = document.getElementById('status-name');

    // 3. YOUTUBE API LOAD
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '360',
            width: '100%', // Flexible width
            videoId: youtubePlaylist[songIdx].id,
            playerVars: { 
                'autoplay': 0, 
                'controls': 1, 
                'rel': 0,
                'enablejsapi': 1,
                'origin': window.location.origin 
            },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    // HANDSHAKE: When jingle ends, play the song
    jinglePlayer.onended = function() {
        playCurrentSong();
    };

    // 4. CORE FUNCTIONS
    function startApp() {
        document.querySelector('.btn-start').style.display = 'none';
        runJingleSequence(); 
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            // Natural progression: Move both forward
            songIdx = (songIdx + 1) % youtubePlaylist.length;
            jingleIdx = (jingleIdx + 1) % jingleSequence.length;
            runJingleSequence();
        }
    }

    function triggerNextRadioCycle() {
        // Stop current audio/video immediately
        if (player && player.stopVideo) player.stopVideo();
        jinglePlayer.pause();
        jinglePlayer.currentTime = 0;

        // Move BOTH indices forward once
        songIdx = (songIdx + 1) % youtubePlaylist.length;
        jingleIdx = (jingleIdx + 1) % jingleSequence.length;

        // Play the next Jingle
        runJingleSequence();
    }

    function runJingleSequence() {
        const jingle = jingleSequence[jingleIdx];
        if (!jingle) return;

        jinglePlayer.src = jingle.file;
        jinglePlayer.load();
        jinglePlayer.play();
        updateUI("Jingle", jingle.name);
    }

    function playCurrentSong() {
        const song = youtubePlaylist[songIdx];
        if (player && player.loadVideoById) {
            player.loadVideoById(song.id);
            updateUI("Music", song.title);
        }
    }

    function updateUI(type, text) {
        statusName.innerText = text;
        statusName.style.color = (type === "Jingle") ? "#3498db" : "#ff4757";
    }
</script>
